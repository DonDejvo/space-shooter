<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevents the "bounce" scroll effect on mobile */
            position: fixed;
            background: #000814;
        }

        canvas {
            display: block;
            /* Position absolute ensures it doesn't push other elements */
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas></canvas>
    <script type="module" src="src/main.js"></script>
</body>

</html>
